# Qwen 2.5 Coder 7B QLoRA fine-tuning configuration
# Source: RFC Section 15.2

model:
  base: "Qwen/Qwen2.5-Coder-7B-Instruct"
  quantization: "nf4"            # 4-bit NormalFloat
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

lora:
  rank: 64
  alpha: 128
  dropout: 0.05
  target_modules: "all-linear"   # All linear layers
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  epochs: 3
  batch_size: 8
  gradient_accumulation_steps: 4  # effective batch = 32
  learning_rate: 2.0e-4
  lr_scheduler: "cosine"
  warmup_steps: 100
  max_seq_length: 2048
  fp16: false
  bf16: true
  gradient_checkpointing: true
  optim: "paged_adamw_8bit"
  weight_decay: 0.01
  max_grad_norm: 1.0
  save_steps: 500
  logging_steps: 10
  eval_steps: 250
  eval_strategy: "steps"
  save_total_limit: 3
  load_best_model_at_end: true

data:
  train_file: "training-data/train.jsonl"
  eval_file: "training-data/eval.jsonl"
  split_ratio: 0.95

output:
  dir: "output/7b-qlora"
  adapter_dir: "output/7b-qlora/adapter"
  merged_dir: "output/7b-merged"
